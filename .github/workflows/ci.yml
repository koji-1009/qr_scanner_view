name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: koji-1009/setup-flutter@9204099837f17eb9ae05760a52360f85640de02d # v1.1.6
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "17"
      - uses: koji-1009/setup-flutter@9204099837f17eb9ae05760a52360f85640de02d # v1.1.6
      - run: flutter build apk --debug
        working-directory: example
      - name: Native unit tests
        run: ./gradlew :qr_scanner_view:testDebugUnitTest
        working-directory: example/android

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: koji-1009/setup-flutter@9204099837f17eb9ae05760a52360f85640de02d # v1.1.6
      - run: flutter build ios --no-codesign --debug
        working-directory: example
      - run: flutter build ios --debug --simulator
        working-directory: example
      - name: Native unit tests
        run: |
          UDID=$(xcrun simctl list devices available --json |
            jq -r '[.devices[][] | select(.isAvailable)][0].udid')
          xcodebuild test -workspace Runner.xcworkspace -scheme Runner \
            -destination "id=$UDID" -quiet
        working-directory: example/ios
