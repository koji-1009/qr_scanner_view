name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: koji-1009/setup-flutter@dd35dcb6aeccda37e5042e1a03aed95e46611a3d # v1.2.1
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: "17"
      - uses: koji-1009/setup-flutter@dd35dcb6aeccda37e5042e1a03aed95e46611a3d # v1.2.1
      - run: flutter build apk --debug
        working-directory: example
      - name: Native unit tests
        run: ./gradlew :qr_scanner_view:testDebugUnitTest
        working-directory: example/android

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: koji-1009/setup-flutter@dd35dcb6aeccda37e5042e1a03aed95e46611a3d # v1.2.1
      - run: flutter build ios --no-codesign --debug
        working-directory: example
      - run: flutter build ios --debug --simulator
        working-directory: example
      - name: Native unit tests
        run: |
          UDID=$(xcrun simctl list devices available --json |
            jq -r '[.devices[][] | select(.isAvailable)][0].udid')
          xcodebuild test -workspace Runner.xcworkspace -scheme Runner \
            -destination "id=$UDID" -quiet
        working-directory: example/ios
