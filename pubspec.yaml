name: qr_scanner_view
description: >-
  Live camera QR / barcode scanner Flutter plugin. Native owns camera, preview
  and detection (AVFoundation, CameraX + ML Kit); only decoded strings cross
  to Dart.
version: 0.1.0
repository: https://github.com/koji-1009/qr_scanner_view
issue_tracker: https://github.com/koji-1009/qr_scanner_view/issues
topics:
  - qr-code
  - barcode
  - scanner
  - camera

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.koji_1009.app.qr_scanner_view
        pluginClass: QrScannerViewPlugin
      ios:
        pluginClass: QrScannerViewPlugin
